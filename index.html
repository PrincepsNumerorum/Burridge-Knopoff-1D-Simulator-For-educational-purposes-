<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バネ・ブロックモデル地震シミュレータ</title>
<style>
    :root {
        --bg: #1e1e2e; --text: #cdd6f4; --panel: #313244;
        --accent: #a6e3a1; --accent-hover: #94e2d5;
        --danger: #f38ba8; --slip: #f9e2af; --energy: #89b4fa;
        --csv: #89dceb; --csv-alt: #f5c2e7;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg); color: var(--text);
        margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
    }
    .header-container {
        display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 950px; margin-bottom: 15px;
    }
    h1 { margin: 0; font-size: 1.5rem; text-align: center; flex: 1; }
    .header-btn {
        flex: 0; min-width: 140px; padding: 8px 12px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
        background-color: var(--panel); color: var(--text); border: 1px solid #45475a; border-radius: 8px; transition: 0.2s;
    }
    .header-btn:hover { background-color: #45475a; }
    
    .container { display: flex; flex-direction: column; gap: 15px; max-width: 950px; width: 100%; }
    .canvas-container {
        background-color: #11111b; border-radius: 12px; padding: 15px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative;
    }
    .graph-stack { display: flex; flex-direction: column; gap: 5px; }
    canvas { display: block; width: 100%; border-radius: 8px; background-color: #181825; cursor: crosshair; }
    .controls {
        background-color: var(--panel); padding: 20px; border-radius: 12px;
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: center;
    }
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
    input[type=range] { width: 100%; cursor: pointer; }
    select {
        background-color: #181825; color: var(--text); border: 1px solid #45475a;
        padding: 8px; border-radius: 6px; outline: none; cursor: pointer;
    }
    .checkbox-group label {
        display: flex; justify-content: flex-start; gap: 10px; cursor: pointer; font-size: 0.9rem;
    }
    .checkbox-group input[type=checkbox] { width: auto; transform: scale(1.3); cursor: pointer; }
    .btn-group { grid-column: 1 / -1; display: flex; gap: 10px; flex-wrap: wrap;}
    button.action-btn {
        flex: 1; min-width: 180px; background-color: var(--accent); color: #11111b; border: none;
        padding: 10px; font-size: 0.9rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s;
    }
    button.action-btn:hover { filter: brightness(1.1); }
    #btn_pause { background-color: var(--danger); color: #fff; }
    #btn_export { background-color: var(--csv); color: #11111b; }
    #btn_export_slip { background-color: var(--csv); color: #11111b; }
    #btn_export_asp { background-color: var(--csv-alt); color: #11111b; }
    #btn_import_asp { background-color: var(--csv-alt); color: #11111b; }
    
    .section-title { 
        display: flex; align-items: center; justify-content: space-between;
        font-size: 1rem; margin-bottom: 5px; color: var(--accent); border-bottom: 1px solid #45475a; padding-bottom: 5px;
    }
    
    .info-icon {
        background: #45475a; border: none; color: #cdd6f4; cursor: pointer; 
        font-size: 0.85rem; font-weight: bold; padding: 0;
        width: 22px; height: 22px; border-radius: 50%;
        display: inline-flex; align-items: center; justify-content: center;
        transition: background 0.2s;
    }
    .info-icon:hover { background: var(--accent); color: #11111b; }
    .canvas-icon {
        position: absolute;
        top: 8px;
        right: 10px;
        z-index: 10;
    }

    .modal {
        display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
    }
    .modal-content {
        background-color: var(--panel); margin: 5% auto; padding: 25px; border-radius: 12px;
        width: 85%; max-width: 700px; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        max-height: 85vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #45475a; padding-bottom: 10px; margin-bottom: 15px;}
    .modal-header h2 { margin: 0; font-size: 1.3rem; color: var(--accent); }
    .close-btn { color: #a6adc8; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1; }
    .close-btn:hover { color: #f38ba8; }
    .modal-body p { line-height: 1.6; margin-bottom: 15px; font-size: 0.95rem; }
    .highlight-text { color: var(--danger); font-weight: bold; }
    
    .info-section {
        margin-bottom: 15px;
        line-height: 1.6;
        font-size: 0.95rem;
    }
    .info-section strong {
        color: var(--accent);
        display: inline-block;
        margin-bottom: 5px;
    }
</style>
</head>
<body>

<div class="header-container">
    <button id="btn_info" class="header-btn" data-i18n="btn_info">ℹ️ 説明・免責事項</button>
    <h1 data-i18n="title">バネ・ブロックモデル地震シミュレータ</h1>
    <button id="btn_lang" class="header-btn" data-i18n="lang_switch">English</button>
</div>

<div class="container">
    <div class="canvas-container">
        <div class="section-title">
            <span data-i18n="section_model">バネ・ブロックモデル 1次元断面図</span>
            <button class="info-icon" data-info="model" title="解説を見る">?</button>
        </div>
        <canvas id="simCanvas" width="900" height="320"></canvas>
    </div>

    <div class="canvas-container">
        <div class="section-title">
            <span data-i18n="section_st">地震の時空間分布（震源域の分布）</span>
            <button class="info-icon" data-info="st" title="解説を見る">?</button>
        </div>
        <canvas id="spaceTimeCanvas" width="900" height="250"></canvas>
    </div>

    <div class="canvas-container graph-stack">
        <div class="section-title" data-i18n="section_dashboard">統計ダッシュボード (リアルタイム更新)</div>
        <div style="position: relative;">
            <button class="info-icon canvas-icon" data-info="gr" title="解説を見る">?</button>
            <canvas id="grCanvas" width="900" height="200"></canvas>
        </div>
        <div style="position: relative;">
            <button class="info-icon canvas-icon" data-info="energy" title="解説を見る">?</button>
            <canvas id="energyCanvas" width="900" height="120"></canvas>
        </div>
        <div style="position: relative;">
            <button class="info-icon canvas-icon" data-info="slip" title="解説を見る">?</button>
            <canvas id="slipCanvas" width="900" height="120"></canvas>
        </div>
        <div style="position: relative;">
            <button class="info-icon canvas-icon" data-info="mt" title="解説を見る">?</button>
            <canvas id="mtCanvas" width="900" height="180"></canvas>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label><span data-i18n="label_N">ブロック数 (N)</span></label>
            <select id="select_N">
                <option value="10" data-i18n="opt_10">10個</option>
                <option value="20" data-i18n="opt_20">20個</option>
                <option value="30" data-i18n="opt_30">30個</option>
                <option value="40" data-i18n="opt_40">40個</option>
                <option value="50" data-i18n="opt_50">50個</option>
            </select>
        </div>
        <div class="control-group">
            <label><span data-i18n="label_preset">アスペリティ分布プリセット</span></label>
            <select id="preset_select">
                <option value="center" data-i18n="preset_center">1. 中央巨大アスペリティ</option>
                <option value="random_strong" data-i18n="preset_random">2. 極大アスペリティ点在</option>
                <option value="uniform" data-i18n="preset_uniform">3. 均質な断層（ゆらぎ・ノイズ強度を下げてください）</option>
                <option value="weak" data-i18n="preset_weak">4. 全体的に固着が弱い断層</option>
            </select>
        </div>
        <div class="control-group">
            <label><span data-i18n="label_fs_max">断層強度 最大値 (Fs)</span> <span id="val_fs_max">150</span></label>
            <input type="range" id="slider_fs_max" min="10" max="400" step="5" value="150">
        </div>
        <div class="control-group">
            <label><span data-i18n="label_fs_min">断層強度 最小値 (Fs)</span> <span id="val_fs_min">15</span></label>
            <input type="range" id="slider_fs_min" min="1" max="100" step="1" value="15">
        </div>
        <div class="control-group">
            <label><span data-i18n="label_fs_noise">ゆらぎ・ノイズ強度</span> <span id="val_fs_noise">0.20</span></label>
            <input type="range" id="slider_fs_noise" min="0" max="1.0" step="0.05" value="0.20">
        </div>

        <div class="control-group">
            <label><span data-i18n="label_V">プレート沈み込み速度 (V)</span> <span id="val_V">0.10</span></label>
            <input type="range" id="slider_V" min="0.01" max="1.0" step="0.01" value="0.10">
        </div>
        <div class="control-group">
            <label><span data-i18n="label_window">グラフ表示幅（時間スケール）</span> <span id="val_window">150</span></label>
            <input type="range" id="slider_window" min="30" max="500" step="10" value="150">
        </div>
        <div class="control-group">
            <label><span data-i18n="label_timeout">同一地震の判定猶予 (閾値:ms)</span> <span id="val_timeout">0.10</span></label>
            <input type="range" id="slider_timeout" min="0.05" max="2.0" step="0.05" value="0.10">
        </div>
        <div class="control-group checkbox-group">
            <label><input type="checkbox" id="check_show_mag" checked> <span data-i18n="label_show_mag">時空間グラフにM表示</span></label>
        </div>
        
        <div class="btn-group">
            <button type="button" class="action-btn" id="btn_apply" data-i18n="btn_apply">設定を適用してリセット</button>
            <button type="button" class="action-btn" id="btn_pause" data-i18n="btn_pause">一時停止 / 再開</button>
            <button type="button" class="action-btn" id="btn_export" data-i18n="btn_export">地震履歴を出力(CSV)</button>
            <button type="button" class="action-btn" id="btn_export_slip" data-i18n="btn_export_slip">滑り分布を出力(CSV)</button>
            <button type="button" class="action-btn" id="btn_export_asp" data-i18n="btn_export_asp">アスペリティ分布を保存</button>
            <button type="button" class="action-btn" id="btn_import_asp" data-i18n="btn_import_asp">アスペリティ分布を読込</button>
            <input type="file" id="file_import_asp" accept=".csv" style="display:none">
        </div>
    </div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal_title">情報・操作方法</h2>
            <span class="close-btn">&times;</span>
        </div>
        <div class="modal-body" id="modal_body">
            </div>
    </div>
</div>

    function updateBlockProps(b, targetFs) {
        b.Fs = Math.max(1, Math.min(targetFs, 1000));

        b.m = 0.5 + (b.Fs / 200.0) * 3.0;

    function initBlocks() {
        N = parseInt(select_N.value);
        blocks = []; energyHistory = []; eventHistory = []; activeEvents = []; allExportableEvents = []; 
        time = 0; totalCumulativeSlip = 0; currentTotalEnergy = 0; maxVisibleEnergy = 1;

        const mode = preset_select.value;
        const fs_max = parseFloat(slider_fs_max.value);
        const fs_min = parseFloat(slider_fs_min.value);
        const noise_level = parseFloat(slider_fs_noise.value);

        let baseProfile = new Float64Array(N);
        
        if (mode === 'center') {
            let mid = N / 2;
            for(let i=0; i<N; i++) baseProfile[i] = Math.exp(-Math.pow((i - mid), 2) / Math.pow(N/4, 2));
        } else if (mode === 'random_strong') {
            for(let i=0; i<N; i++) baseProfile[i] = 0.1;
            let giantCount = Math.floor(Math.random() * 2) + 2;
            for(let k=0; k<giantCount; k++) baseProfile[Math.floor(Math.random() * N)] = 1.0;
        } else if (mode === 'uniform') {
            for(let i=0; i<N; i++) baseProfile[i] = 0.5;
        } else if (mode === 'weak') {
            for(let i=0; i<N; i++) baseProfile[i] = 0.05;
        }

        for(let i=0; i<N; i++) {
            let b = { u: 0, w: 0, v: 0, isSliding: false, slip: 0, currentEvent: null };
            let targetFs = fs_min + baseProfile[i] * (fs_max - fs_min);
            let noise = 1.0 + noise_level * (Math.random() * 2.0 - 1.0);
            targetFs *= noise;
            targetFs = Math.max(fs_min, Math.min(targetFs, fs_max));
            updateBlockProps(b, targetFs);
            blocks.push(b);
        }
    }

    function getSpacing() { return (simCanvas.width - 120) / Math.max(1, N - 1); }
    function getStartX() { return 60; }
    function getVisualSize(Fs, spacing) {
        let maxV = spacing * 0.9; let minV = spacing * 0.25;
        return minV + (Math.min(Fs, 400) / 400.0) * (maxV - minV);
    }
    function getDrawScale() { return Math.max(1.5, 5.0 * (10 / N)); }

    function handleCanvasClick(e) {

        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
        }
        const mouseX = clientX - rect.left;
        const spacing = getSpacing(); const startX = getStartX(); const drawScale = getDrawScale();
        for(let i=0; i<N; i++) {
            let b = blocks[i]; let vSize = getVisualSize(b.Fs, spacing);
            let blockX = startX + i * spacing - b.w * drawScale;
            if (mouseX >= blockX - 5 && mouseX <= blockX + vSize + 5) {
                updateBlockProps(b, e.shiftKey ? b.Fs - 10 : b.Fs + 10);
                if(isPaused) draw(); break;
            }
        }
    }

    function getDerivatives(U, V_vel, current_t) {
        let dU = new Float64Array(N); let dV = new Float64Array(N);
        for(let i=0; i<N; i++) {
            let b = blocks[i];
            if (!b.isSliding) { dU[i] = 0; dV[i] = 0; } 
            else {
                dU[i] = V_vel[i];
                let f_drive = K * (V * current_t - U[i]);
                let f_left = (i > 0) ? k * (U[i-1] - U[i]) : 0;
                let f_right = (i < N - 1) ? k * (U[i+1] - U[i]) : 0;
                let F_spring = f_drive + f_left + f_right;
                let accel = (F_spring - b.Fd - radiationDamping * V_vel[i]) / b.m;
                dV[i] = accel;
            }
        }
        return { dU, dV };
    }

    function updatePhysics() {
        if (isPaused) return;

        for(let i=0; i<N; i++) {
            let b = blocks[i];
            if (!b.isSliding) {
                let f_drive = K * (V * time - b.u);
                let f_left = (i > 0) ? k * (blocks[i-1].u - b.u) : 0;
                let f_right = (i < N - 1) ? k * (blocks[i+1].u - b.u) : 0;
                let F_spring = f_drive + f_left + f_right;
                
                if (F_spring > b.Fs) {
                    b.isSliding = true; b.v = 1e-5; 
                    let adjacentEvents = [];
                    if (i > 0 && blocks[i-1].isSliding && blocks[i-1].currentEvent) adjacentEvents.push(blocks[i-1].currentEvent);
                    if (i < N - 1 && blocks[i+1].isSliding && blocks[i+1].currentEvent && adjacentEvents.indexOf(blocks[i+1].currentEvent) === -1) {
                        adjacentEvents.push(blocks[i+1].currentEvent);
                    }
                    if (adjacentEvents.length === 0) {
                        let newEvent = { startTime: time, lastActiveTime: time, epicenter: i, involvedBlocks: new Set([i]), eventSlips: new Map() };
                        activeEvents.push(newEvent); b.currentEvent = newEvent;
                    } else {
                        let targetEvent = adjacentEvents[0];
                        if (adjacentEvents.length > 1) {
                            let evToMerge = adjacentEvents[1];
                            evToMerge.involvedBlocks.forEach(b_idx => {
                                targetEvent.involvedBlocks.add(b_idx);
                                if (blocks[b_idx].currentEvent === evToMerge) blocks[b_idx].currentEvent = targetEvent;
                            });
                            evToMerge.eventSlips.forEach((val, key) => targetEvent.eventSlips.set(key, (targetEvent.eventSlips.get(key) || 0) + val));
                            if (evToMerge.startTime < targetEvent.startTime) { targetEvent.startTime = evToMerge.startTime; targetEvent.epicenter = evToMerge.epicenter; }
                            let idx = activeEvents.indexOf(evToMerge); if (idx !== -1) activeEvents.splice(idx, 1);
                        }
                        targetEvent.involvedBlocks.add(i); b.currentEvent = targetEvent;
                    }
                }
            }
        }

        let U = blocks.map(b => b.u); let V_vel = blocks.map(b => b.v);
        let k1 = getDerivatives(U, V_vel, time);
        let U2 = U.map((u, i) => u + 0.5 * dt * k1.dU[i]); let V2 = V_vel.map((v, i) => Math.max(0, v + 0.5 * dt * k1.dV[i]));
        let k2 = getDerivatives(U2, V2, time + 0.5 * dt);
        let U3 = U.map((u, i) => u + 0.5 * dt * k2.dU[i]); let V3 = V_vel.map((v, i) => Math.max(0, v + 0.5 * dt * k2.dV[i]));
        let k3 = getDerivatives(U3, V3, time + 0.5 * dt);
        let U4 = U.map((u, i) => u + dt * k3.dU[i]); let V4 = V_vel.map((v, i) => Math.max(0, v + dt * k3.dV[i]));
        let k4 = getDerivatives(U4, V4, time + dt);

        let incrementalSlipTotal = 0; 
        currentTotalEnergy = 0; 

        for(let i=0; i<N; i++) {
            let b = blocks[i];
            if (b.isSliding) {
                let dU_final = (dt/6) * (k1.dU[i] + 2*k2.dU[i] + 2*k3.dU[i] + k4.dU[i]);
                let dV_final = (dt/6) * (k1.dV[i] + 2*k2.dV[i] + 2*k3.dV[i] + k4.dV[i]);
                b.u += dU_final; b.v += dV_final; b.slip += dU_final; incrementalSlipTotal += dU_final;
                
                if (b.currentEvent) { b.currentEvent.eventSlips.set(i, (b.currentEvent.eventSlips.get(i) || 0) + dU_final); b.currentEvent.lastActiveTime = time; }
                
                if (b.v <= 0) {
                    let f_drive = K * (V * (time + dt) - b.u);
                    let f_left = (i > 0) ? k * (blocks[i-1].u - b.u) : 0;
                    let f_right = (i < N - 1) ? k * (blocks[i+1].u - b.u) : 0;
                    let F_spring = f_drive + f_left + f_right;
                    if (F_spring < b.Fs) { b.isSliding = false; b.v = 0; b.currentEvent = null; } 
                    else { b.v = 0; }
                }
            }
            b.w = V * (time + dt) - b.u;
            currentTotalEnergy += 0.5 * K * b.w * b.w;
            if(i < N - 1) { let diff = b.u - blocks[i+1].u; currentTotalEnergy += 0.5 * k * diff * diff; }
        }
        totalCumulativeSlip += (incrementalSlipTotal / N);

        for (let j = activeEvents.length - 1; j >= 0; j--) {
            let ev = activeEvents[j];
            if (time - ev.lastActiveTime > eventTimeout) {
                ev.endTime = ev.lastActiveTime;
                let totalEventSlip = 0; ev.eventSlips.forEach(val => totalEventSlip += val);
                let A = area_per_block * ev.involvedBlocks.size;
                let avgSlip = totalEventSlip / ev.involvedBlocks.size;
                let M0 = mu_rigidity * A * avgSlip; 
                if (totalEventSlip > 0.005) { ev.magnitude = Math.max(0, (2.0 / 3.0) * (Math.log10(M0) - 9.1)); } 
                else { ev.magnitude = 0; }
                eventHistory.push(ev); allExportableEvents.push(ev); activeEvents.splice(j, 1); 
            }
        }
        time += dt;
    }

    function drawSpring(ctx, x1, y1, x2, y2, coils, radius, color) { 
        let dx = x2 - x1; let dy = y2 - y1; let dist = Math.hypot(dx, dy); let angle = Math.atan2(dy, dx);
        ctx.save(); ctx.translate(x1, y1); ctx.rotate(angle); ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(0, 0); let coilLen = dist / (coils + 1);
        for(let i=0; i<coils; i++) { let sign = (i % 2 === 0) ? 1 : -1; ctx.lineTo(coilLen * (i + 0.5), radius * sign); }
        ctx.lineTo(dist, 0); ctx.stroke(); ctx.restore();
    }

    function getSharedX(t) { 
        let startTimeWindow = Math.max(0, time - graphTimeWindow);
        return 60 + ((t - startTimeWindow) / graphTimeWindow) * (simCanvas.width - 80); 
    }

    function drawGraphFrame(ctx, label, labelColor, isBottom=false) {
        let bottomY = isBottom ? ctx.canvas.height - 20 : ctx.canvas.height - 10;
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        ctx.strokeStyle = '#45475a'; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(60, 10); ctx.lineTo(60, bottomY); ctx.lineTo(ctx.canvas.width - 20, bottomY);
        ctx.moveTo(ctx.canvas.width - 20, 10); ctx.lineTo(ctx.canvas.width - 20, bottomY);
        ctx.stroke(); 
        ctx.fillStyle = labelColor; ctx.font = "12px sans-serif"; ctx.textAlign = "left"; 
        ctx.fillText(label, 65, 20); 
    }

    function drawYGrid(ctx, minVal, maxVal, ticks, formatFunc, bottomMargin=10) {
        ctx.fillStyle = '#a6adc8'; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
        let range = maxVal - minVal;
        if (range === 0) range = 1; 
        let h = ctx.canvas.height - 10 - bottomMargin;
        for(let i=0; i<=ticks; i++) {
            let val = minVal + (range * i / ticks);
            let y = ctx.canvas.height - bottomMargin - (val - minVal) / range * h;
            ctx.fillText(formatFunc(val), 55, y + 4);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(ctx.canvas.width - 20, y); ctx.stroke();
        }
    }

    function drawXGrid(ctx, minT, maxT, ticks, isBottom=false) {
        ctx.fillStyle = '#a6adc8'; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
        let bottomMargin = isBottom ? 20 : 10;
        for(let i=0; i<=ticks; i++) {
            let tVal = minT + ((maxT - minT) * i / ticks);
            let x = getSharedX(tVal);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath(); ctx.moveTo(x, 10); ctx.lineTo(x, ctx.canvas.height - bottomMargin); ctx.stroke();
            if(isBottom) {
                ctx.fillText("t=" + Math.floor(tVal), x, ctx.canvas.height - 5);
            }
        }
    }

    function drawMTGrid(ctx, maxM, bottomMargin) {
        ctx.fillStyle = '#a6adc8'; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
        let h = ctx.canvas.height - 10 - bottomMargin;
        for(let m=2; m<=8; m+=2) {
            let y = ctx.canvas.height - bottomMargin - (m / maxM) * h;
            if(y >= 10) {
                ctx.fillText("M" + m, 55, y + 4);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(ctx.canvas.width - 20, y); ctx.stroke();
            }
        }
    }

    function drawGRFrame(ctx) {
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        ctx.strokeStyle = '#45475a'; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(60, 10); ctx.lineTo(60, ctx.canvas.height - 30); ctx.lineTo(ctx.canvas.width - 20, ctx.canvas.height - 30);
        ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.font = "12px sans-serif"; ctx.textAlign = "left";
        ctx.fillText(t("gr_law"), 65, 20);
        ctx.textAlign = "center";
        ctx.fillText("Magnitude (M)", (ctx.canvas.width + 40) / 2, ctx.canvas.height - 5);
        ctx.save(); ctx.translate(15, ctx.canvas.height / 2); ctx.rotate(-Math.PI/2);
        ctx.fillText("Log N", 0, 0); ctx.restore();
    }

    function drawGRGraph() {
        try {
            drawGRFrame(grCtx);

            if (allExportableEvents.length === 0) {
                grCtx.fillStyle = '#f9e2af'; grCtx.textAlign = "center";
                grCtx.fillText(t("waiting_events"), grCanvas.width / 2, grCanvas.height / 2);
                return;
            }

            if (grCache.count !== allExportableEvents.length) {
                grCache.count = allExportableEvents.length;
                let mags = allExportableEvents.map(e => e.magnitude).filter(m => m >= 0.1);
                mags.sort((a,b) => b - a);
                grCache.mags = mags;
                
                if (mags.length >= 3) {
                    grCache.maxM = Math.ceil(Math.max(...mags)) + 0.5;
                    grCache.maxLogN = Math.max(1, Math.ceil(Math.log10(mags.length))); 
                    
                    let binSize = 0.1;
                    let counts = {}; let maxCount = 0; let Mc = 0;
                    mags.forEach(m => {
                        let bin = parseFloat((Math.floor(m / binSize) * binSize).toFixed(1));
                        counts[bin] = (counts[bin] || 0) + 1;
                        if (counts[bin] > maxCount) { maxCount = counts[bin]; Mc = bin; }
                    });

                    let validMags = mags.filter(m => m >= Mc);
                    if (validMags.length >= 3) {
                        let meanM = validMags.reduce((a,b) => a+b, 0) / validMags.length;
                        if (meanM >= Mc) {
                            grCache.b_val = Math.log10(Math.E) / (meanM - Mc + (binSize / 2));
                            grCache.a_val = Math.log10(validMags.length) + grCache.b_val * Mc;
                            grCache.Mc = Mc;
                            grCache.valid = true;
                        } else { grCache.valid = false; }
                    } else { grCache.valid = false; }
                } else { grCache.valid = false; }
            }

            let mags = grCache.mags;
            
            grCtx.fillStyle = '#cdd6f4'; grCtx.textAlign = "right"; grCtx.font = "14px sans-serif";
            grCtx.fillText(`${t("total_events")}${mags.length}`, grCanvas.width - 30, 30);

            if (mags.length < 3) {
                grCtx.fillStyle = '#f9e2af'; grCtx.textAlign = "center";
                grCtx.fillText(t("collecting_data"), grCanvas.width / 2, grCanvas.height / 2);
                return;
            }

            let maxM = grCache.maxM;
            let maxLogN = grCache.maxLogN;
            let graphW = grCanvas.width - 80;
            let graphH = grCanvas.height - 40;
            let startX = 60;
            let startY = grCanvas.height - 30;

            function getX(m) { return startX + (m / maxM) * graphW; }
            function getY(logN) { return startY - (logN / maxLogN) * graphH; }

            grCtx.fillStyle = '#a6adc8'; grCtx.font = "10px sans-serif"; grCtx.textAlign = "right";
            for(let logN=0; logN<=maxLogN; logN++) {
                let y = getY(logN);
                grCtx.fillText(Math.pow(10, logN).toString(), startX - 5, y + 4);
                grCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                grCtx.beginPath(); grCtx.moveTo(startX, y); grCtx.lineTo(startX + graphW, y); grCtx.stroke();
            }

            grCtx.textAlign = "center";
            let mStep = maxM > 10 ? 2 : 1;
            for(let m=0; m<=Math.ceil(maxM); m+=mStep) {
                let x = getX(m);
                grCtx.fillText("M" + m, x, startY + 15);
                grCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                grCtx.beginPath(); grCtx.moveTo(x, startY); grCtx.lineTo(x, startY - graphH); grCtx.stroke();
            }

            grCtx.fillStyle = '#a6e3a1';
            for(let i=0; i<mags.length; i++) {
                let logN = Math.log10(i + 1);
                grCtx.beginPath(); grCtx.arc(getX(mags[i]), getY(logN), 2.5, 0, Math.PI * 2); grCtx.fill();
            }

            if (grCache.valid) {
                let Mc = grCache.Mc;
                let a_val = grCache.a_val;
                let b_val = grCache.b_val;

                grCtx.strokeStyle = '#f38ba8'; grCtx.lineWidth = 2; grCtx.setLineDash([5, 5]);
                grCtx.beginPath(); grCtx.moveTo(getX(Mc), getY(a_val - b_val * Mc)); grCtx.lineTo(getX(maxM), getY(Math.max(0, a_val - b_val * maxM))); grCtx.stroke();
                grCtx.setLineDash([]);

                grCtx.fillStyle = '#cdd6f4'; grCtx.textAlign = "right"; grCtx.font = "14px sans-serif";
                grCtx.fillText(`Mc: ${Mc.toFixed(1)}`, grCanvas.width - 30, 50);
                grCtx.fillText(`b = ${b_val.toFixed(4)}`, grCanvas.width - 30, 70);
                grCtx.fillText(`a = ${a_val.toFixed(2)}`, grCanvas.width - 30, 90);
            }
        } catch (e) { 
            console.error("G-R plot error:", e);
            grCtx.fillStyle = '#f38ba8'; grCtx.textAlign = "center";
            grCtx.fillText(t("draw_error"), grCanvas.width / 2, grCanvas.height / 2);
        }
    }

    function draw() {
        const spacing = getSpacing(); const startX = getStartX(); const drawScale = getDrawScale();
        const startTimeWindow = Math.max(0, time - graphTimeWindow);

        simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
        const plateY = 40; const faultY = 260; 

        simCtx.fillStyle = '#313244'; simCtx.fillRect(0, faultY, simCanvas.width, simCanvas.height - faultY);
        simCtx.strokeStyle = '#45475a'; simCtx.lineWidth = 2;
        let offset = isPaused ? 0 : -(time * V * drawScale) % 40;
        for(let x = offset; x < simCanvas.width; x += 40) { simCtx.beginPath(); simCtx.moveTo(x, faultY); simCtx.lineTo(x - 20, simCanvas.height); simCtx.stroke(); }
        simCtx.fillStyle = '#4c4f69'; simCtx.fillRect(0, 0, simCanvas.width, plateY);

        simCtx.fillStyle = '#cdd6f4'; simCtx.font = "bold 14px sans-serif"; simCtx.textAlign = "left";
        simCtx.fillText(t("continental_plate"), 20, 25);
        simCtx.fillText(t("oceanic_plate"), 20, faultY + 25);

        simCtx.beginPath(); simCtx.moveTo(310, faultY + 20); simCtx.lineTo(250, faultY + 20);
        simCtx.lineTo(260, faultY + 12); simCtx.moveTo(250, faultY + 20); simCtx.lineTo(260, faultY + 28);
        simCtx.strokeStyle = '#a6e3a1'; simCtx.lineWidth = 3; simCtx.lineJoin = 'round'; simCtx.stroke();
        simCtx.fillStyle = '#a6e3a1'; simCtx.font = "12px sans-serif"; simCtx.fillText(t("subduction_dir"), 320, faultY + 24);

        let fontSize = N >= 40 ? 8 : (N >= 20 ? 10 : 12);
        let springRadius = Math.min(4, spacing * 0.15);

        for(let i=0; i<N; i++) {
            let b = blocks[i]; let vSize = getVisualSize(b.Fs, spacing);
            let blockX = startX + i * spacing - b.w * drawScale; let blockY = faultY - vSize;
            drawSpring(simCtx, startX + i * spacing, plateY, blockX + vSize/2, blockY, 6, springRadius, '#585b70');
            if (i < N - 1) {
                let nextB = blocks[i+1]; let nextVSize = getVisualSize(nextB.Fs, spacing);
                let nextBlockX = startX + (i+1) * spacing - nextB.w * drawScale;
                drawSpring(simCtx, blockX + vSize, blockY + vSize/2, nextBlockX, faultY - nextVSize + nextVSize/2, 4, springRadius, '#7f849c');
            }
        }

        for(let i=0; i<N; i++) {
            let b = blocks[i]; let vSize = getVisualSize(b.Fs, spacing);
            let blockX = startX + i * spacing - b.w * drawScale; let blockY = faultY - vSize;
            let intensity = Math.min(1, Math.max(0, (b.Fs - 5) / 150)); 
            simCtx.fillStyle = `rgb(${Math.floor(200+55*intensity)}, ${Math.floor(150-100*intensity)}, ${Math.floor(150-100*intensity)})`;
            simCtx.fillRect(blockX, blockY, vSize, vSize);
            if (b.isSliding) { simCtx.strokeStyle = '#f9e2af'; simCtx.lineWidth = 2; simCtx.strokeRect(blockX - 1, blockY - 1, vSize + 2, vSize + 2); }
            
            let currentForce = K*b.w + ((i>0)?-k*(blocks[i-1].w-b.w):0) + ((i<N-1)?k*(b.w-blocks[i+1].w):0);
            let ratio = Math.max(0, currentForce / b.Fs);
            let gaugeHeight = N >= 40 ? 3 : 5; let gaugeOffset = N >= 40 ? 8 : 12;
            
            simCtx.fillStyle = '#313244'; simCtx.fillRect(blockX, blockY - gaugeOffset, vSize, gaugeHeight);
            simCtx.fillStyle = ratio > 0.9 ? '#f38ba8' : (ratio > 0.7 ? '#f9e2af' : '#a6e3a1');
            simCtx.fillRect(blockX, blockY - gaugeOffset, vSize * Math.min(ratio, 1), gaugeHeight);
            simCtx.fillStyle = '#cdd6f4'; simCtx.font = `${fontSize}px sans-serif`; simCtx.textAlign = "center";
            simCtx.fillText(N >= 40 ? `${i}` : `B${i}`, blockX + vSize/2, blockY - gaugeOffset - 4);
        }

        stCtx.clearRect(0, 0, stCanvas.width, stCanvas.height);
        stCtx.strokeStyle = '#313244'; stCtx.lineWidth = 1;
        for(let i=0; i<N; i++) {
            stCtx.beginPath(); stCtx.moveTo(startX + i * spacing, 0); stCtx.lineTo(startX + i * spacing, stCanvas.height); stCtx.stroke();
            if (N < 40 || i % 2 === 0) {
                stCtx.fillStyle = '#585b70'; stCtx.font = `${fontSize}px sans-serif`; stCtx.textAlign = "center";
                stCtx.fillText(N >= 40 ? `${i}` : `B${i}`, startX + i * spacing, 10);
            }
        }

        function getStY(t) { return stCanvas.height - ((t - startTimeWindow) / graphTimeWindow) * stCanvas.height; }
        const allCurrentEvents = [...eventHistory, ...activeEvents];
        const showMagOnSt = check_show_mag.checked; 

        for(let ev of allCurrentEvents) {
            if ((ev.endTime || time) < startTimeWindow) continue;
            let yBottom = getStY(ev.startTime); let yTop = getStY(ev.endTime || time);
            let minB = Math.min(...ev.involvedBlocks); let maxB = Math.max(...ev.involvedBlocks);
            let extend = spacing * 0.4; let xLeft = startX + minB * spacing - extend; let xRight = startX + maxB * spacing + extend;
            
            stCtx.fillStyle = ev.magnitude > 5.5 ? 'rgba(243, 139, 168, 0.5)' : 'rgba(166, 227, 161, 0.4)';
            stCtx.fillRect(xLeft, yTop, xRight - xLeft, Math.max(2, yBottom - yTop));

            let epiX = startX + ev.epicenter * spacing;
            stCtx.fillStyle = '#f38ba8'; stCtx.beginPath();
            stCtx.arc(epiX, yBottom, N >= 40 ? 2.5 : 4, 0, Math.PI * 2); stCtx.fill();

            if (ev.endTime && ev.magnitude > 0 && showMagOnSt) {
                stCtx.fillStyle = '#cdd6f4'; stCtx.font = "11px sans-serif"; stCtx.textAlign = "left";
                stCtx.fillText(`M${ev.magnitude.toFixed(1)}`, epiX + 6, yBottom + 4);
            }
        }

        drawGRGraph();

        let minVisibleSlip = 0, maxVisibleSlip = 0.1;
        maxVisibleEnergy = 1;
        if(energyHistory.length > 0) {
            minVisibleSlip = energyHistory[0].slip; maxVisibleSlip = energyHistory[energyHistory.length-1].slip;
            for(let data of energyHistory) { if (data.t >= startTimeWindow && data.e > maxVisibleEnergy) maxVisibleEnergy = data.e; }
        }

        drawGraphFrame(energyCtx, t("total_strain_energy"), '#ffffff');
        drawGraphFrame(slipCtx, t("cumulative_slip"), '#ffffff');
        drawGraphFrame(mtCtx, t("mt_log"), '#ffffff', true);

        drawYGrid(energyCtx, 0, maxVisibleEnergy, 3, v => v.toExponential(1), 10);
        drawXGrid(energyCtx, startTimeWindow, startTimeWindow + graphTimeWindow, 5, false);

        drawYGrid(slipCtx, minVisibleSlip, maxVisibleSlip, 3, v => v.toFixed(1) + "m", 10);
        drawXGrid(slipCtx, startTimeWindow, startTimeWindow + graphTimeWindow, 5, false);

        let maxMag = 8.0; 
        drawMTGrid(mtCtx, maxMag, 20);
        drawXGrid(mtCtx, startTimeWindow, startTimeWindow + graphTimeWindow, 5, true);

        if(energyHistory.length > 0) {
            let hE = energyCanvas.height - 20; let hS = slipCanvas.height - 20;
            let slipRange = Math.max(0.1, maxVisibleSlip - minVisibleSlip); 

            energyCtx.strokeStyle = '#89b4fa'; energyCtx.lineWidth = 2; energyCtx.beginPath();
            let startedE = false;
            for(let data of energyHistory) {
                if (data.t < startTimeWindow) continue;
                let x = getSharedX(data.t); let y = energyCanvas.height - 10 - (data.e / maxVisibleEnergy) * hE;
                if(!startedE) { energyCtx.moveTo(x, y); startedE = true; } else { energyCtx.lineTo(x, y); }
            }
            energyCtx.stroke();

            slipCtx.strokeStyle = '#f9e2af'; slipCtx.lineWidth = 2; slipCtx.beginPath();
            let startedS = false;
            for(let data of energyHistory) {
                if (data.t < startTimeWindow) continue;
                let x = getSharedX(data.t); let y = slipCanvas.height - 10 - ((data.slip - minVisibleSlip) / slipRange) * hS;
                if(!startedS) { slipCtx.moveTo(x, y); startedS = true; } else { slipCtx.lineTo(x, y); }
            }
            slipCtx.stroke();
        }

        let textLogIndex = 0; 
        for(let ev of allCurrentEvents) {
            if ((ev.endTime || time) < startTimeWindow) continue;
            let evStart = Math.max(startTimeWindow, ev.startTime); let xStart = getSharedX(evStart); 
            let xEnd = Math.max(xStart + 2, getSharedX(ev.endTime || time));
            mtCtx.fillStyle = 'rgba(69, 71, 90, 0.4)'; mtCtx.fillRect(xStart, 10, xEnd - xStart, mtCanvas.height - 30);

            if (ev.endTime && ev.magnitude > 0) {
                let magY = mtCanvas.height - 20 - (ev.magnitude / maxMag) * (mtCanvas.height - 30);
                mtCtx.strokeStyle = ev.magnitude > 6 ? '#f38ba8' : '#a6e3a1'; mtCtx.lineWidth = 2; mtCtx.beginPath();
                mtCtx.moveTo(xStart, mtCanvas.height - 20); mtCtx.lineTo(xStart, Math.max(10, magY)); mtCtx.stroke();
                mtCtx.fillStyle = ev.magnitude > 6 ? '#f38ba8' : '#a6e3a1'; mtCtx.beginPath();
                mtCtx.arc(xStart, Math.max(10, magY), ev.magnitude > 6 ? 4 : 2, 0, Math.PI * 2); mtCtx.fill();
                let yOffset = (textLogIndex % 4) * 14; 
                let minB = Math.min(...ev.involvedBlocks); let maxB = Math.max(...ev.involvedBlocks);
                mtCtx.fillStyle = '#cdd6f4'; mtCtx.textAlign = "center"; mtCtx.font = "10px sans-serif";
                mtCtx.fillText(`M${ev.magnitude.toFixed(1)} [${minB}-${maxB}]`, xStart, 25 + yOffset);
                textLogIndex++;
            }
        }
    }

    function animate() {
        if (!isPaused) {
            for(let step=0; step<subSteps; step++) { updatePhysics(); }
            
            energyHistory.push({ t: time, e: currentTotalEnergy, slip: totalCumulativeSlip });
            
            let startTimeWindow = time - graphTimeWindow;
            let cutoffOld = startTimeWindow - graphTimeWindow * 1.5;
            
            if (energyHistory.length > 0 && energyHistory[0].t < cutoffOld) {
                let cutoffKeep = startTimeWindow - graphTimeWindow * 0.5;
                let cutIdx = 0;
                while(cutIdx < energyHistory.length && energyHistory[cutIdx].t < cutoffKeep) cutIdx++;
                if(cutIdx > 0) energyHistory = energyHistory.slice(cutIdx);
            }

            if (eventHistory.length > 0 && eventHistory[0].endTime < cutoffOld) {
                let cutoffKeep = startTimeWindow - graphTimeWindow * 0.5;
                let cutIdx = 0;
                while(cutIdx < eventHistory.length && eventHistory[cutIdx].endTime < cutoffKeep) cutIdx++;
                if(cutIdx > 0) eventHistory = eventHistory.slice(cutIdx);
            }
        }
        draw(); requestAnimationFrame(animate);
    }

    window.onload = () => {
        updateLang();
        openModal('main');
    };

    initBlocks();
    updateLabels();
    animate();
</script>
